<div class="gestor-recursos">
  <!-- Formulario para agregar (solo tutores) -->
  <div class="agregar-form" *ngIf="esTutor">
    <h4 class="form-title">Agregar Recurso</h4>
    <div class="campo-grupo">
      <label class="campo-label" for="recurso-titulo">Título</label>
      <input
        id="recurso-titulo"
        type="text"
        class="campo-input"
        placeholder="Ej: Guía de Angular"
        [(ngModel)]="nuevoTitulo"
        [disabled]="enviando"
      />
    </div>
    <div class="campo-grupo">
      <label class="campo-label" for="recurso-url">URL</label>
      <input
        id="recurso-url"
        type="url"
        class="campo-input"
        placeholder="https://ejemplo.com/recurso"
        [(ngModel)]="nuevaUrl"
        [disabled]="enviando"
      />
    </div>
    <button class="btn-agregar" (click)="agregarRecurso()" [disabled]="enviando">
      <svg
        *ngIf="!enviando"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      <span *ngIf="!enviando">Agregar</span>
      <span *ngIf="enviando">Agregando...</span>
    </button>
  </div>

  <!-- Estado de carga -->
  <div class="loading-state" *ngIf="cargando">
    <div class="spinner"></div>
    <span>Cargando recursos...</span>
  </div>

  <!-- Lista de recursos -->
  <div class="recursos-list" *ngIf="!cargando">
    <!-- Estado vacío -->
    <div class="empty-state" *ngIf="recursos.length === 0">
      <svg
        width="40"
        height="40"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
      </svg>
      <p>No hay recursos disponibles aún.</p>
    </div>

    <!-- Tarjetas de recurso -->
    <div class="recurso-card" *ngFor="let recurso of recursos">
      <div class="recurso-info">
        <svg
          class="recurso-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
        </svg>
        <div class="recurso-details">
          <a class="recurso-link" [href]="recurso.url" target="_blank" rel="noopener noreferrer">
            {{ recurso.titulo }}
          </a>
          <span class="recurso-fecha">{{ recurso.creadoEn | date: 'dd/MM/yyyy HH:mm' }}</span>
        </div>
      </div>
      <button
        class="btn-eliminar"
        *ngIf="esTutor"
        (click)="eliminarRecurso(recurso.id)"
        [disabled]="eliminandoRecursoId === recurso.id"
        title="Eliminar recurso"
      >
        <ng-container *ngIf="eliminandoRecursoId !== recurso.id; else spinnerRecurso">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path
              d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
            ></path>
          </svg>
        </ng-container>
        <ng-template #spinnerRecurso><div class="spinner"></div></ng-template>
      </button>
    </div>
  </div>
</div>
